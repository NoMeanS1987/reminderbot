name: Reminder Bot

on:
  schedule:
    # Время в UTC. Москва = UTC+3, поэтому 7:00–21:00 МСК = 4:00–18:00 UTC.
    # Некруглые минуты (7, 37) — меньше очередь на раннерах GitHub, запуски стабильнее.
    - cron: "7,37 4-17 * * *"   # ~каждые 30 мин: 7:07–20:37 МСК
    - cron: "7 18 * * *"        # ~21:07 МСК
  workflow_dispatch:            # ручной запуск для теста

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
